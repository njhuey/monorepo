line-length = 100
target-version = "py313"

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "N",    # pep8-naming
  "UP",   # pyupgrade
  "ANN",  # flake8-annotations
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "SIM",  # flake8-simplify
  "TCH",  # flake8-type-checking
  "RUF",  # ruff-specific rules
]
ignore = [
  "ANN401", # disallow `Any` — overly strict for some cases
]

[lint.isort]
known-first-party = ["monorepo"]

[format]
quote-style = "double"
indent-style = "space"
