name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pantsbuild/actions/init-pants@v8
        with:
          pants-ci-config: pants.toml
          named-caches-hash: ${{ hashFiles('third_party/python/default.lock') }}
          cache-lmdb-store: "true"
      - name: Run lint
        run: pants lint ::

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pantsbuild/actions/init-pants@v8
        with:
          pants-ci-config: pants.toml
          named-caches-hash: ${{ hashFiles('third_party/python/default.lock') }}
          cache-lmdb-store: "true"
      - name: Run mypy
        run: pants check ::

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pantsbuild/actions/init-pants@v8
        with:
          pants-ci-config: pants.toml
          named-caches-hash: ${{ hashFiles('third_party/python/default.lock') }}
          cache-lmdb-store: "true"
      - name: Run tests
        run: pants test ::
